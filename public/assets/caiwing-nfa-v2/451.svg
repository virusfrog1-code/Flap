      @keyframes breathe { 0%, 100% { opacity: .46; transform: scale(.985); } 50% { opacity: .92; transform: scale(1.018); } }
      @keyframes scan { 0% { stroke-dashoffset: 63; } 100% { stroke-dashoffset: -197; } }
      .base { filter: saturate(1.16) hue-rotate(317deg); }
      .ring { transform-origin: 512px 512px; animation: rotateRing 18s linear infinite; }
      .breath { transform-origin: 512px 512px; animation: breathe 5s ease-in-out infinite; }
      .scan { animation: scan 8s linear infinite; }
      .label { font-family: Inter, Arial, sans-serif; letter-spacing: 0; }
    </style>
  </defs>
