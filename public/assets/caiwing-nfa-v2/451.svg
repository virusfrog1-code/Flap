<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="财翼 NFA #451">
  <defs>
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="64" ry="64"/>
    </clipPath>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7ad9"/>
      <stop offset="52%" stop-color="#f8d66a"/>
      <stop offset="100%" stop-color="#070914"/>
